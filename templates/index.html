<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Labelme</title>

<style>
  * {
    box-sizing: border-box;
  }

  html,
  body {
    height: 100%;
    margin: 0;
    font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
    font-size: 13px;
    background: #1e1e1e;
    color: #ddd;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  #toolbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
    padding: 6px 8px;
    background: #2d2d2d;
    border-bottom: 1px solid #444;
  }

  #toolbar .sep {
    width: 1px;
    height: 22px;
    background: #555;
    margin: 0 4px;
  }

  #toolbar button {
    background: #3c3c3c;
    color: #ddd;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
  }

  #toolbar button:hover {
    background: #4a4a4a;
  }

  #toolbar button.active {
    background: #0e639c;
    border-color: #1177bb;
    color: #fff;
  }

  #toolbar button:disabled {
    opacity: .4;
    cursor: default;
  }

  #toolbar label {
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
  }

  #main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  #canvasWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #262626;
    min-width: 0;
  }

  #cv {
    position: absolute;
    top: 0;
    left: 0;
  }

  #side {
    width: 260px;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    background: #252526;
    border-left: 1px solid #444;
  }

  .panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-bottom: 1px solid #444;
  }

  .panel h3 {
    margin: 0;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    color: #bbb;
    background: #2d2d2d;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .panel ul {
    margin: 0;
    padding: 0;
    list-style: none;
    overflow-y: auto;
    flex: 1;
  }

  #shapePanel {
    flex: 3;
  }

  #labelPanel {
    flex: 2;
  }

  #filePanel {
    flex: 3;
  }

  .panel li {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel li:hover {
    background: #333;
  }

  .panel li.active {
    background: #0e639c;
    color: #fff;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex: none;
  }

  .panel li .txt {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .panel li .del {
    flex: none;
    border: none;
    background: none;
    color: #999;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
  }

  .panel li .del:hover {
    color: #ff6b6b;
  }

  .annotated-mark {
    color: #4caf50;
    flex: none;
  }

  #status {
    display: flex;
    gap: 16px;
    padding: 4px 10px;
    background: #007acc;
    color: #fff;
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
  }

  #status span {
    flex: none;
  }

  #stDirty {
    color: #ffd54f;
    font-weight: bold;
  }

  .modal-mask {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-box {
    background: #2d2d2d;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 16px;
    width: 320px;
    max-width: 90vw;
  }

  .modal-box h3 {
    margin: 0 0 12px;
    font-size: 14px;
  }

  .modal-box input {
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 8px;
    background: #1e1e1e;
    border: 1px solid #555;
    border-radius: 4px;
    color: #ddd;
    font-size: 13px;
  }

  .modal-box input:focus {
    outline: none;
    border-color: #0e639c;
  }

  #quickLabels {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
    max-height: 100px;
    overflow-y: auto;
  }

  #quickLabels button {
    background: #3c3c3c;
    border: 1px solid #555;
    color: #ddd;
    border-radius: 10px;
    padding: 2px 10px;
    cursor: pointer;
    font-size: 12px;
  }

  #quickLabels button:hover {
    background: #0e639c;
  }

  .modal-btns {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .modal-btns button {
    padding: 5px 16px;
    border-radius: 4px;
    border: 1px solid #555;
    cursor: pointer;
    font-size: 13px;
    background: #3c3c3c;
    color: #ddd;
  }

  .modal-btns button.primary {
    background: #0e639c;
    border-color: #1177bb;
    color: #fff;
  }

  #toast {
    position: fixed;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    z-index: 200;
    display: none;
    border: 1px solid #555;
  }

  #toast.err {
    background: #a33;
  }
</style>
</head>

<body>
<div id="app">

  <div id="toolbar">
    <button id="btnPrev" title="上一张 (A)">◀ 上一张</button>
    <button id="btnNext" title="下一张 (D)">下一张 ▶</button>

    <div class="sep"></div>

    <button
      data-mode="edit"
      class="mode-btn"
      title="编辑模式 (E)"
    >✥ 编辑</button>

    <button
      data-mode="polygon"
      class="mode-btn"
      title="创建多边形 (P)"
    >⬡ 多边形</button>

    <button
      data-mode="rectangle"
      class="mode-btn"
      title="创建矩形 (R)"
    >▭ 矩形</button>

    <button
      data-mode="circle"
      class="mode-btn"
      title="创建圆 (C)"
    >◯ 圆</button>

    <!-- 原来的 line 已替换为 linestrip -->
    <button
      data-mode="linestrip"
      class="mode-btn"
      title="创建折线：双击或按 Enter 完成 (L)"
    >〽 折线</button>

    <button
      data-mode="point"
      class="mode-btn"
      title="创建点 (O)"
    >· 点</button>

    <div class="sep"></div>

    <button id="btnUndo" title="撤销 (Ctrl+Z)">↩ 撤销</button>
    <button id="btnDel" title="删除选中 (Delete)">🗑 删除</button>

    <div class="sep"></div>

    <button id="btnSave" title="保存 (Ctrl+S)">💾 保存</button>

    <label>
      <input type="checkbox" id="autoSave" checked>
      自动保存
    </label>

    <div class="sep"></div>

    <button id="btnZoomIn" title="放大 (+)">＋</button>
    <button id="btnZoomOut" title="缩小 (-)">－</button>
    <button id="btnFit" title="适应窗口 (F)">适应</button>
    <button id="btnOrig" title="原始大小">1:1</button>
  </div>

  <div id="main">
    <div id="canvasWrap">
      <canvas id="cv"></canvas>
    </div>

    <div id="side">
      <div class="panel" id="shapePanel">
        <h3>标注列表</h3>
        <ul id="shapeList"></ul>
      </div>

      <div class="panel" id="labelPanel">
        <h3>标签</h3>
        <ul id="labelList"></ul>
      </div>

      <div class="panel" id="filePanel">
        <h3>
          文件列表
          <span id="fileCount"></span>
        </h3>
        <ul id="fileList"></ul>
      </div>
    </div>
  </div>

  <div id="status">
    <span id="stFile">未加载</span>
    <span id="stZoom"></span>
    <span id="stPos"></span>
    <span id="stMode"></span>
    <span id="stDirty"></span>
  </div>
</div>

<div id="modal" class="modal-mask" style="display:none">
  <div class="modal-box">
    <h3>标注标签</h3>

    <input
      id="labelInput"
      list="labelOptions"
      placeholder="输入标签名称"
      autocomplete="off"
    >

    <datalist id="labelOptions"></datalist>

    <div id="quickLabels"></div>

    <input
      id="groupInput"
      type="number"
      placeholder="Group ID（可选）"
    >

    <div class="modal-btns">
      <button id="modalCancel">取消</button>
      <button id="modalOk" class="primary">确定</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function () {
  "use strict";

  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  const wrap = document.getElementById("canvasWrap");

  const modal = document.getElementById("modal");
  const labelInput = document.getElementById("labelInput");
  const groupInput = document.getElementById("groupInput");

  // ============================================================
  // 状态
  // ============================================================

  let images = [];
  let curIdx = -1;

  let img = null;
  let imgW = 0;
  let imgH = 0;

  /*
   * shape:
   * {
   *   label,
   *   points: [[x, y], ...],
   *   group_id,
   *   shape_type,
   *   flags,
   *   hidden
   * }
   */
  let shapes = [];

  let dirty = false;
  let history = [];

  let view = {
    scale: 1,
    ox: 0,
    oy: 0
  };

  let mode = "edit";

  /*
   * polygon 和 linestrip 共用 drawing。
   *
   * polygon:
   *   至少 3 个点，完成后闭合。
   *
   * linestrip:
   *   至少 2 个点，完成后不闭合。
   */
  let drawing = [];

  // 矩形、圆的起始点
  let drawStart = null;

  let mouse = null;
  let mouseImg = null;

  let selectedIdx = -1;

  let hover = {
    shape: -1,
    handle: null,
    edge: null
  };

  let drag = null;
  let spaceDown = false;
  let lastLabel = "";

  let annotated = new Set();
  let labelColors = {};

  /*
   * 【修复 3】图片加载序号。
   *
   * 快速连续翻图时，旧图片的 onload / fetch 可能晚于新图片完成，
   * 导致旧图的标注被写到新图上。
   * 每次 openImage 递增序号，异步回调中若序号不匹配则丢弃结果。
   */
  let loadSeq = 0;

  const PALETTE = [
    "#e6194b",
    "#3cb44b",
    "#4363d8",
    "#f58231",
    "#911eb4",
    "#42d4f4",
    "#f032e6",
    "#bfef45",
    "#469990",
    "#9a6324",
    "#800000",
    "#808000",
    "#000075",
    "#fabed4",
    "#ffe119"
  ];

  function getColor(label) {
    if (!(label in labelColors)) {
      const index = Object.keys(labelColors).length % PALETTE.length;
      labelColors[label] = PALETTE[index];
    }

    return labelColors[label];
  }

  function hexA(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);

    return `rgba(${r},${g},${b},${alpha})`;
  }

  /*
   * 兼容部分旧数据或非标准数据。
   *
   * Labelme 中折线的标准名称为 linestrip，
   * 如果后端返回 polyline，则在前端转换为 linestrip。
   */
  function normalizeShapeType(type) {
    if (type === "polyline") {
      return "linestrip";
    }

    return type || "polygon";
  }

  // ============================================================
  // 坐标转换
  // ============================================================

  function i2c(point) {
    return [
      point[0] * view.scale + view.ox,
      point[1] * view.scale + view.oy
    ];
  }

  function c2i(x, y) {
    return [
      (x - view.ox) / view.scale,
      (y - view.oy) / view.scale
    ];
  }

  function clampPt(point) {
    return [
      Math.max(0, Math.min(imgW, point[0])),
      Math.max(0, Math.min(imgH, point[1]))
    ];
  }

  // ============================================================
  // 几何计算
  // ============================================================

  function dist(a, b) {
    return Math.hypot(
      a[0] - b[0],
      a[1] - b[1]
    );
  }

  function projSeg(p, a, b) {
    const dx = b[0] - a[0];
    const dy = b[1] - a[1];
    const lengthSquared = dx ** 2 + dy ** 2;

    if (lengthSquared === 0) {
      return a.slice();
    }

    let t = (
      (p[0] - a[0]) * dx +
      (p[1] - a[1]) * dy
    ) / lengthSquared;

    t = Math.max(0, Math.min(1, t));

    return [
      a[0] + t * dx,
      a[1] + t * dy
    ];
  }

  function distSeg(p, a, b) {
    return dist(p, projSeg(p, a, b));
  }

  function inPoly(p, points) {
    let inside = false;

    for (
      let i = 0, j = points.length - 1;
      i < points.length;
      j = i++
    ) {
      if (
        ((points[i][1] > p[1]) !== (points[j][1] > p[1])) &&
        (
          p[0] <
          (
            (points[j][0] - points[i][0]) *
            (p[1] - points[i][1]) /
            (points[j][1] - points[i][1])
          ) +
          points[i][0]
        )
      ) {
        inside = !inside;
      }
    }

    return inside;
  }

  function rectCorners(shape) {
    const [p0, p1] = shape.points;

    return [
      [p0[0], p0[1]],
      [p1[0], p0[1]],
      [p1[0], p1[1]],
      [p0[0], p1[1]]
    ];
  }

  function getHandles(shape) {
    if (shape.shape_type === "rectangle") {
      return rectCorners(shape);
    }

    return shape.points;
  }

  function moveHandle(shape, handleIndex, newPoint) {
    if (shape.shape_type === "rectangle") {
      let p0 = shape.points[0].slice();
      let p1 = shape.points[1].slice();

      if (handleIndex === 0) {
        p0 = [newPoint[0], newPoint[1]];
      } else if (handleIndex === 1) {
        p1[0] = newPoint[0];
        p0[1] = newPoint[1];
      } else if (handleIndex === 2) {
        p1 = [newPoint[0], newPoint[1]];
      } else {
        p0[0] = newPoint[0];
        p1[1] = newPoint[1];
      }

      shape.points = [p0, p1];
      return;
    }

    if (
      shape.shape_type === "circle" &&
      handleIndex === 0
    ) {
      const dx = newPoint[0] - shape.points[0][0];
      const dy = newPoint[1] - shape.points[0][1];

      shape.points[0] = [
        newPoint[0],
        newPoint[1]
      ];

      shape.points[1] = [
        shape.points[1][0] + dx,
        shape.points[1][1] + dy
      ];

      return;
    }

    shape.points[handleIndex] = [
      newPoint[0],
      newPoint[1]
    ];
  }

  function normalizeRect(shape) {
    const [p0, p1] = shape.points;

    shape.points = [
      [
        Math.min(p0[0], p1[0]),
        Math.min(p0[1], p1[1])
      ],
      [
        Math.max(p0[0], p1[0]),
        Math.max(p0[1], p1[1])
      ]
    ];
  }

  function shapeContains(shape, point, threshold) {
    switch (shape.shape_type) {
      case "polygon":
        return inPoly(point, shape.points);

      case "rectangle": {
        const [p0, p1] = shape.points;

        return (
          point[0] >= Math.min(p0[0], p1[0]) &&
          point[0] <= Math.max(p0[0], p1[0]) &&
          point[1] >= Math.min(p0[1], p1[1]) &&
          point[1] <= Math.max(p0[1], p1[1])
        );
      }

      case "circle":
        return (
          dist(point, shape.points[0]) <=
          dist(shape.points[0], shape.points[1])
        );

      case "point":
        return dist(point, shape.points[0]) < threshold;

      /*
       * line、linestrip 以及其他开放路径。
       *
       * 保留 line 的识别能力，是为了兼容已经存在的旧标注，
       * 但本页面不再创建新的 line。
       */
      default:
        for (let i = 0; i < shape.points.length - 1; i++) {
          if (
            distSeg(
              point,
              shape.points[i],
              shape.points[i + 1]
            ) < threshold
          ) {
            return true;
          }
        }

        return false;
    }
  }

  function findHandle(point, threshold) {
    for (let shapeIndex = shapes.length - 1; shapeIndex >= 0; shapeIndex--) {
      if (shapes[shapeIndex].hidden) {
        continue;
      }

      const handles = getHandles(shapes[shapeIndex]);

      for (let handleIndex = 0; handleIndex < handles.length; handleIndex++) {
        if (dist(point, handles[handleIndex]) < threshold) {
          return {
            si: shapeIndex,
            hi: handleIndex
          };
        }
      }
    }

    return null;
  }

  function findEdge(point, threshold) {
    if (selectedIdx < 0) {
      return null;
    }

    const shape = shapes[selectedIdx];

    if (
      !shape ||
      shape.hidden ||
      (
        shape.shape_type !== "polygon" &&
        shape.shape_type !== "linestrip"
      )
    ) {
      return null;
    }

    const pointCount = shape.points.length;

    const edgeCount = (
      shape.shape_type === "polygon"
        ? pointCount
        : pointCount - 1
    );

    for (let i = 0; i < edgeCount; i++) {
      const a = shape.points[i];
      const b = shape.points[(i + 1) % pointCount];

      if (distSeg(point, a, b) < threshold) {
        const pos = projSeg(point, a, b);

        if (
          dist(pos, a) > threshold &&
          dist(pos, b) > threshold
        ) {
          return {
            si: selectedIdx,
            after: i,
            pos
          };
        }
      }
    }

    return null;
  }

  function findShape(point, threshold) {
    for (let shapeIndex = shapes.length - 1; shapeIndex >= 0; shapeIndex--) {
      if (shapes[shapeIndex].hidden) {
        continue;
      }

      if (
        shapeContains(
          shapes[shapeIndex],
          point,
          threshold
        )
      ) {
        return shapeIndex;
      }
    }

    return -1;
  }

  // ============================================================
  // 历史记录与脏标记
  // ============================================================

  function snapshot() {
    history.push(JSON.stringify(shapes));

    if (history.length > 50) {
      history.shift();
    }
  }

  function undo() {
    if (!history.length) {
      return;
    }

    shapes = JSON.parse(history.pop());

    selectedIdx = -1;
    drag = null;

    markDirty();
    refreshShapeList();
    refreshLabelList();
    render();
  }

  function markDirty() {
    dirty = true;
    updateStatus();
  }

  // ============================================================
  // 网络请求
  // ============================================================

  async function loadImageList() {
    const response = await fetch("./api/images?detail=1");
    const list = await response.json();

    images = list.map(item => item.name);

    annotated = new Set(
      list
        .filter(item => item.annotated)
        .map(item => item.name)
    );

    refreshFileList();

    if (images.length) {
      openImage(0);
    } else {
      flash("目录中没有图片", true);
    }
  }

  async function openImage(index) {
    if (
      index < 0 ||
      index >= images.length
    ) {
      return;
    }

    if (index === curIdx && img) {
      return;
    }

    if (dirty) {
      if (document.getElementById("autoSave").checked) {
        await save();
      } else {
        const confirmed = confirm(
          "当前图片有未保存的修改，切换将丢失。确定切换？"
        );

        if (!confirmed) {
          return;
        }
      }
    }

    curIdx = index;

    shapes = [];
    history = [];
    selectedIdx = -1;
    drawing = [];
    drawStart = null;
    drag = null;
    dirty = false;

    const name = images[index];

    /*
     * 【修复 3】记录本次加载的序号，并使用局部变量 im，
     * 避免回调中引用被后续 openImage 覆盖的全局 img。
     */
    const seq = ++loadSeq;

    const im = new Image();
    img = im;

    im.onload = async function () {
      // 已经切到别的图了，丢弃本次结果
      if (seq !== loadSeq) {
        return;
      }

      imgW = im.naturalWidth;
      imgH = im.naturalHeight;

      fitView();

      try {
        const response = await fetch(
          "./api/annotation?image=" +
          encodeURIComponent(name)
        );

        const data = await response.json();

        // fetch 期间可能又切换了图片，再判断一次
        if (seq !== loadSeq) {
          return;
        }

        shapes = (data.shapes || []).map(shape => ({
          label: shape.label,

          points: (shape.points || []).map(point => [
            point[0],
            point[1]
          ]),

          group_id: (
            shape.group_id === undefined
              ? null
              : shape.group_id
          ),

          // polyline 自动转换为标准 linestrip
          shape_type: normalizeShapeType(shape.shape_type),

          flags: shape.flags || {},

          hidden: false
        }));

        shapes.forEach(shape => {
          getColor(shape.label);
        });

        if (shapes.length) {
          annotated.add(name);
        }
      } catch (error) {
        if (seq !== loadSeq) {
          return;
        }

        flash("加载标注失败", true);
      }

      dirty = false;

      refreshShapeList();
      refreshLabelList();
      refreshFileList();
      render();
      updateStatus();
    };

    im.onerror = function () {
      if (seq !== loadSeq) {
        return;
      }

      flash("图片加载失败: " + name, true);
    };

    im.src = "./images/" + encodeURIComponent(name);

    refreshFileList();
    updateStatus();
  }

  async function save() {
    if (curIdx < 0) {
      return;
    }

    const name = images[curIdx];

    const annotation = {
      version: "5.0.1",
      flags: {},

      shapes: shapes.map(shape => ({
        label: shape.label,

        points: shape.points.map(point => [
          Math.round(point[0] * 100) / 100,
          Math.round(point[1] * 100) / 100
        ]),

        group_id: (
          shape.group_id === undefined
            ? null
            : shape.group_id
        ),

        // 保存时确保 polyline 被写成 linestrip
        shape_type: normalizeShapeType(shape.shape_type),

        flags: shape.flags || {}
      })),

      imagePath: name,
      imageData: null,
      imageHeight: imgH,
      imageWidth: imgW
    };

    try {
      const response = await fetch("./api/annotation", {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          imagePath: name,
          annotation
        })
      });

      if (response.ok) {
        dirty = false;
        annotated.add(name);

        flash("已保存 " + name);
        refreshFileList();
        updateStatus();
      } else {
        flash("保存失败", true);
      }
    } catch (error) {
      flash("保存失败: " + error.message, true);
    }
  }

  // ============================================================
  // 视图
  // ============================================================

  function fitView() {
    const width = wrap.clientWidth;
    const height = wrap.clientHeight;

    if (!imgW || !imgH) {
      return;
    }

    view.scale = Math.min(
      width / imgW,
      height / imgH
    ) * 0.95;

    view.ox = (
      width - imgW * view.scale
    ) / 2;

    view.oy = (
      height - imgH * view.scale
    ) / 2;
  }

  function zoomAt(canvasX, canvasY, factor) {
    const newScale = Math.min(
      60,
      Math.max(
        0.02,
        view.scale * factor
      )
    );

    const relativeFactor = newScale / view.scale;

    view.ox = (
      canvasX -
      (canvasX - view.ox) * relativeFactor
    );

    view.oy = (
      canvasY -
      (canvasY - view.oy) * relativeFactor
    );

    view.scale = newScale;

    render();
    updateStatus();
  }

  // ============================================================
  // 渲染
  // ============================================================

  function render() {
    const width = wrap.clientWidth;
    const height = wrap.clientHeight;
    const dpr = window.devicePixelRatio || 1;

    if (
      cv.width !== Math.round(width * dpr) ||
      cv.height !== Math.round(height * dpr)
    ) {
      cv.width = Math.round(width * dpr);
      cv.height = Math.round(height * dpr);

      cv.style.width = width + "px";
      cv.style.height = height + "px";
    }

    ctx.setTransform(
      dpr,
      0,
      0,
      dpr,
      0,
      0
    );

    ctx.fillStyle = "#262626";
    ctx.fillRect(0, 0, width, height);

    if (
      img &&
      img.complete &&
      imgW
    ) {
      ctx.imageSmoothingEnabled = view.scale < 3;

      ctx.drawImage(
        img,
        view.ox,
        view.oy,
        imgW * view.scale,
        imgH * view.scale
      );

      ctx.strokeStyle = "#555";
      ctx.lineWidth = 1;

      ctx.strokeRect(
        view.ox - 0.5,
        view.oy - 0.5,
        imgW * view.scale + 1,
        imgH * view.scale + 1
      );
    }

    shapes.forEach((shape, index) => {
      if (!shape.hidden) {
        drawShapeC(shape, index);
      }
    });

    drawPreview();
    drawCrosshair(width, height);
  }

  function pathShape(shape) {
    ctx.beginPath();

    switch (shape.shape_type) {
      case "rectangle": {
        const a = i2c(shape.points[0]);
        const b = i2c(shape.points[1]);

        ctx.rect(
          Math.min(a[0], b[0]),
          Math.min(a[1], b[1]),
          Math.abs(b[0] - a[0]),
          Math.abs(b[1] - a[1])
        );

        break;
      }

      case "circle": {
        const center = i2c(shape.points[0]);

        const radius = (
          dist(
            shape.points[0],
            shape.points[1]
          ) * view.scale
        );

        ctx.arc(
          center[0],
          center[1],
          radius,
          0,
          Math.PI * 2
        );

        break;
      }

      case "point": {
        const center = i2c(shape.points[0]);

        ctx.arc(
          center[0],
          center[1],
          4,
          0,
          Math.PI * 2
        );

        break;
      }

      case "polygon": {
        const points = shape.points.map(i2c);

        points.forEach((point, index) => {
          if (index === 0) {
            ctx.moveTo(point[0], point[1]);
          } else {
            ctx.lineTo(point[0], point[1]);
          }
        });

        ctx.closePath();
        break;
      }

      /*
       * linestrip 和旧 line 都走开放路径。
       * 不执行 closePath()。
       */
      default: {
        const points = shape.points.map(i2c);

        points.forEach((point, index) => {
          if (index === 0) {
            ctx.moveTo(point[0], point[1]);
          } else {
            ctx.lineTo(point[0], point[1]);
          }
        });
      }
    }
  }

  function drawShapeC(shape, index) {
    const color = getColor(shape.label);

    const active = (
      index === selectedIdx ||
      index === hover.shape
    );

    pathShape(shape);

    /*
     * line 和 linestrip 都是开放线条，
     * 不进行内部填充。
     */
    if (
      shape.shape_type !== "line" &&
      shape.shape_type !== "linestrip"
    ) {
      ctx.fillStyle = hexA(
        color,
        active ? 0.35 : 0.12
      );

      ctx.fill();
    }

    ctx.lineWidth = active ? 3 : 2;
    ctx.strokeStyle = color;
    ctx.stroke();

    // 绘制顶点
    getHandles(shape).forEach((point, handleIndex) => {
      const canvasPoint = i2c(point);

      const isHovered = (
        hover.handle &&
        hover.handle.si === index &&
        hover.handle.hi === handleIndex
      );

      ctx.beginPath();

      ctx.arc(
        canvasPoint[0],
        canvasPoint[1],
        isHovered
          ? 6
          : (index === selectedIdx ? 5 : 3.5),
        0,
        Math.PI * 2
      );

      ctx.fillStyle = isHovered
        ? "#fff"
        : color;

      ctx.fill();

      ctx.lineWidth = 1.5;
      ctx.strokeStyle = "#fff";
      ctx.stroke();
    });

    // 边插入提示
    if (
      hover.edge &&
      hover.edge.si === index &&
      !drag
    ) {
      const canvasPoint = i2c(hover.edge.pos);

      ctx.beginPath();

      ctx.arc(
        canvasPoint[0],
        canvasPoint[1],
        5,
        0,
        Math.PI * 2
      );

      ctx.fillStyle = "rgba(255,255,255,.9)";
      ctx.fill();

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // 标签文字
    if (!shape.points.length) {
      return;
    }

    const textPoint = i2c(shape.points[0]);

    const text = (
      shape.label +
      (
        shape.group_id != null
          ? ` (${shape.group_id})`
          : ""
      )
    );

    ctx.font = "12px sans-serif";

    const textWidth = ctx.measureText(text).width;

    ctx.fillStyle = hexA(color, 0.85);

    ctx.fillRect(
      textPoint[0],
      textPoint[1] - 18,
      textWidth + 8,
      16
    );

    ctx.fillStyle = "#fff";

    ctx.fillText(
      text,
      textPoint[0] + 4,
      textPoint[1] - 6
    );
  }

  function drawPreview() {
    /*
     * 多边形和折线共用连续点击预览。
     */
    if (
      (mode === "polygon" || mode === "linestrip") &&
      drawing.length
    ) {
      const points = drawing.map(i2c);

      ctx.beginPath();

      points.forEach((point, index) => {
        if (index === 0) {
          ctx.moveTo(point[0], point[1]);
        } else {
          ctx.lineTo(point[0], point[1]);
        }
      });

      // 当前最后一个点连接鼠标位置
      if (mouse) {
        ctx.lineTo(
          mouse[0],
          mouse[1]
        );
      }

      ctx.strokeStyle = "#00e676";
      ctx.lineWidth = 2;
      ctx.stroke();

      // 绘制已经确定的顶点
      points.forEach(point => {
        ctx.beginPath();

        ctx.arc(
          point[0],
          point[1],
          4,
          0,
          Math.PI * 2
        );

        ctx.fillStyle = "#00e676";
        ctx.fill();
      });

      /*
       * 只有 polygon 才显示起点闭合提示。
       * linestrip 不允许点击起点闭合。
       */
      if (
        mode === "polygon" &&
        drawing.length >= 3 &&
        mouseImg &&
        dist(mouseImg, drawing[0]) < 8 / view.scale
      ) {
        ctx.beginPath();

        ctx.arc(
          points[0][0],
          points[0][1],
          8,
          0,
          Math.PI * 2
        );

        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // 矩形、圆的两点预览
    if (
      drawStart &&
      mouseImg
    ) {
      const a = i2c(drawStart);
      const b = mouse;

      ctx.strokeStyle = "#00e676";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);

      ctx.beginPath();

      if (mode === "rectangle") {
        ctx.rect(
          Math.min(a[0], b[0]),
          Math.min(a[1], b[1]),
          Math.abs(b[0] - a[0]),
          Math.abs(b[1] - a[1])
        );
      } else if (mode === "circle") {
        ctx.arc(
          a[0],
          a[1],
          dist(drawStart, mouseImg) * view.scale,
          0,
          Math.PI * 2
        );
      }

      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function drawCrosshair(width, height) {
    if (
      mode === "edit" ||
      !mouse ||
      !img
    ) {
      return;
    }

    ctx.strokeStyle = "rgba(0,230,118,.5)";
    ctx.lineWidth = 1;

    ctx.beginPath();

    ctx.moveTo(mouse[0], 0);
    ctx.lineTo(mouse[0], height);

    ctx.moveTo(0, mouse[1]);
    ctx.lineTo(width, mouse[1]);

    ctx.stroke();
  }

  // ============================================================
  // 图形创建
  // ============================================================

  function createShape(type, points) {
    showLabelDialog(lastLabel, null).then(result => {
      if (!result) {
        render();
        return;
      }

      lastLabel = result.label;

      snapshot();

      shapes.push({
        label: result.label,
        points,
        group_id: result.group,
        shape_type: normalizeShapeType(type),
        flags: {},
        hidden: false
      });

      selectedIdx = shapes.length - 1;

      markDirty();
      refreshShapeList();
      refreshLabelList();
      render();
    });
  }

  /*
   * 完成多点图形。
   *
   * polygon 至少需要 3 个点。
   * linestrip 至少需要 2 个点。
   */
  function finishMultiPoint() {
    if (mode === "polygon") {
      if (drawing.length < 3) {
        flash("多边形至少需要 3 个点", true);
        return false;
      }
    } else if (mode === "linestrip") {
      if (drawing.length < 2) {
        flash("折线至少需要 2 个点", true);
        return false;
      }
    } else {
      return false;
    }

    const type = mode;
    const points = drawing.map(point => point.slice());

    drawing = [];

    createShape(type, points);

    return true;
  }

  /*
   * 完成矩形或圆。
   * 原来的 line 创建逻辑已删除。
   */
  function finishTwoPoint(secondPoint) {
    if (!drawStart) {
      return;
    }

    const firstPoint = drawStart;
    drawStart = null;

    if (mode === "rectangle") {
      if (
        Math.abs(secondPoint[0] - firstPoint[0]) < 1 ||
        Math.abs(secondPoint[1] - firstPoint[1]) < 1
      ) {
        return;
      }

      createShape("rectangle", [
        [
          Math.min(firstPoint[0], secondPoint[0]),
          Math.min(firstPoint[1], secondPoint[1])
        ],
        [
          Math.max(firstPoint[0], secondPoint[0]),
          Math.max(firstPoint[1], secondPoint[1])
        ]
      ]);

      return;
    }

    if (mode === "circle") {
      if (dist(firstPoint, secondPoint) < 1) {
        return;
      }

      createShape("circle", [
        firstPoint,
        secondPoint
      ]);
    }
  }

  function deleteSelected() {
    if (selectedIdx < 0) {
      return;
    }

    snapshot();

    shapes.splice(selectedIdx, 1);
    selectedIdx = -1;

    markDirty();
    refreshShapeList();
    refreshLabelList();
    render();
  }

  function editLabel(index) {
    const shape = shapes[index];

    if (!shape) {
      return;
    }

    showLabelDialog(
      shape.label,
      shape.group_id
    ).then(result => {
      if (!result) {
        return;
      }

      snapshot();

      shape.label = result.label;
      shape.group_id = result.group;

      markDirty();
      refreshShapeList();
      refreshLabelList();
      render();
    });
  }

  // ============================================================
  // 鼠标事件
  // ============================================================

  cv.addEventListener("contextmenu", event => {
    event.preventDefault();
  });

  cv.addEventListener("mousedown", event => {
    const x = event.offsetX;
    const y = event.offsetY;
    const imagePoint = c2i(x, y);

    /*
     * 右键、中键或按住空格：
     * 默认用于平移。
     *
     * 但是在 polygon / linestrip 绘制过程中，
     * 右键优先删除最后一个节点。
     */
    if (
      event.button === 2 ||
      event.button === 1 ||
      spaceDown
    ) {
      if (
        event.button === 2 &&
        (mode === "polygon" || mode === "linestrip") &&
        drawing.length
      ) {
        drawing.pop();
        render();
        return;
      }

      drag = {
        type: "pan",
        sx: x,
        sy: y,
        ox: view.ox,
        oy: view.oy
      };

      cv.style.cursor = "grabbing";
      return;
    }

    if (
      event.button !== 0 ||
      !img
    ) {
      return;
    }

    const threshold = 8 / view.scale;

    /*
     * 多边形和折线：
     * 左键单击连续添加节点。
     */
    if (
      mode === "polygon" ||
      mode === "linestrip"
    ) {
      /*
       * 只有多边形可以通过点击第一个点闭合。
       * 折线不会闭合。
       */
      if (
        mode === "polygon" &&
        drawing.length >= 3 &&
        dist(imagePoint, drawing[0]) < threshold
      ) {
        finishMultiPoint();
      } else {
        drawing.push(
          clampPt(imagePoint)
        );
      }

      render();
      return;
    }

    /*
     * 矩形和圆：
     * 支持两次点击或鼠标拖动。
     */
    if (
      mode === "rectangle" ||
      mode === "circle"
    ) {
      if (!drawStart) {
        drawStart = clampPt(imagePoint);
      } else {
        finishTwoPoint(
          clampPt(imagePoint)
        );
      }

      render();
      return;
    }

    if (mode === "point") {
      createShape(
        "point",
        [clampPt(imagePoint)]
      );

      return;
    }

    // ----------------------------------------------------------
    // 编辑模式
    // ----------------------------------------------------------

    const handle = findHandle(
      imagePoint,
      threshold
    );

    if (handle) {
      selectedIdx = handle.si;

      const shape = shapes[handle.si];

      if (event.shiftKey) {
        const canDeletePolygonPoint = (
          shape.shape_type === "polygon" &&
          shape.points.length > 3
        );

        const canDeleteLineStripPoint = (
          shape.shape_type === "linestrip" &&
          shape.points.length > 2
        );

        if (
          canDeletePolygonPoint ||
          canDeleteLineStripPoint
        ) {
          snapshot();

          shape.points.splice(
            handle.hi,
            1
          );

          markDirty();
        }
      } else {
        snapshot();

        drag = {
          type: "vertex",
          si: handle.si,
          hi: handle.hi,
          moved: false
        };
      }

      render();
      refreshShapeList();
      return;
    }

    const edge = findEdge(
      imagePoint,
      threshold
    );

    if (edge) {
      snapshot();

      shapes[edge.si].points.splice(
        edge.after + 1,
        0,
        edge.pos.slice()
      );

      drag = {
        type: "vertex",
        si: edge.si,
        hi: edge.after + 1,
        moved: true
      };

      markDirty();
      render();
      return;
    }

    const shapeIndex = findShape(
      imagePoint,
      threshold
    );

    if (shapeIndex >= 0) {
      selectedIdx = shapeIndex;

      snapshot();

      drag = {
        type: "shape",
        si: shapeIndex,
        last: imagePoint,
        moved: false
      };
    } else {
      selectedIdx = -1;
    }

    render();
    refreshShapeList();
  });

  window.addEventListener("mousemove", event => {
    const rect = cv.getBoundingClientRect();

    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;

    mouse = [x, y];
    mouseImg = c2i(x, y);

    const threshold = 8 / view.scale;

    if (drag) {
      if (drag.type === "pan") {
        view.ox = (
          drag.ox +
          (x - drag.sx)
        );

        view.oy = (
          drag.oy +
          (y - drag.sy)
        );
      } else if (drag.type === "vertex") {
        const shape = shapes[drag.si];

        if (shape) {
          drag.moved = true;

          moveHandle(
            shape,
            drag.hi,
            clampPt(mouseImg)
          );

          markDirty();
        }
      } else if (drag.type === "shape") {
        const shape = shapes[drag.si];

        if (shape) {
          drag.moved = true;

          const dx = mouseImg[0] - drag.last[0];
          const dy = mouseImg[1] - drag.last[1];

          shape.points = shape.points.map(point => [
            point[0] + dx,
            point[1] + dy
          ]);

          drag.last = mouseImg;

          markDirty();
        }
      }

      render();
      updateStatus();
      return;
    }

    if (
      mode === "edit" &&
      img
    ) {
      hover.handle = findHandle(
        mouseImg,
        threshold
      );

      hover.edge = hover.handle
        ? null
        : findEdge(mouseImg, threshold);

      hover.shape = (
        hover.handle ||
        hover.edge
      )
        ? -1
        : findShape(mouseImg, threshold);

      cv.style.cursor = spaceDown
        ? "grab"
        : hover.handle
          ? "pointer"
          : hover.edge
            ? "copy"
            : hover.shape >= 0
              ? "move"
              : "default";
    } else {
      hover = {
        shape: -1,
        handle: null,
        edge: null
      };

      cv.style.cursor = spaceDown
        ? "grab"
        : "crosshair";
    }

    render();
    updateStatus();
  });

  window.addEventListener("mouseup", () => {
    if (drag) {
      if (
        (
          drag.type === "vertex" ||
          drag.type === "shape"
        ) &&
        !drag.moved
      ) {
        history.pop();
      }

      if (
        drag.type === "vertex" &&
        shapes[drag.si] &&
        shapes[drag.si].shape_type === "rectangle"
      ) {
        normalizeRect(shapes[drag.si]);
      }

      drag = null;
      render();
      return;
    }

    /*
     * 支持拖拽方式画矩形和圆。
     * linestrip 不使用拖拽完成。
     */
    if (
      drawStart &&
      mouseImg &&
      (
        mode === "rectangle" ||
        mode === "circle"
      )
    ) {
      if (
        dist(drawStart, mouseImg) *
        view.scale >
        5
      ) {
        finishTwoPoint(
          clampPt(mouseImg)
        );

        render();
      }
    }
  });

  /*
   * 双击完成 polygon 或 linestrip。
   */
  cv.addEventListener("dblclick", event => {
    if (
      mode === "polygon" ||
      mode === "linestrip"
    ) {
      /*
       * dblclick 之前浏览器会触发第二次 mousedown，
       * 因而可能连续加入两个相同的最后节点。
       * 这里删除重复节点。
       */
      while (
        drawing.length > 1 &&
        dist(
          drawing[drawing.length - 1],
          drawing[drawing.length - 2]
        ) < 1e-6
      ) {
        drawing.pop();
      }

      finishMultiPoint();
      render();
      return;
    }

    if (mode === "edit") {
      const imagePoint = c2i(
        event.offsetX,
        event.offsetY
      );

      const shapeIndex = findShape(
        imagePoint,
        8 / view.scale
      );

      if (shapeIndex >= 0) {
        editLabel(shapeIndex);
      }
    }
  });

  cv.addEventListener(
    "wheel",
    event => {
      event.preventDefault();

      zoomAt(
        event.offsetX,
        event.offsetY,
        event.deltaY < 0
          ? 1.12
          : 1 / 1.12
      );
    },
    {
      passive: false
    }
  );

  // ============================================================
  // 键盘事件
  // ============================================================

  document.addEventListener("keydown", event => {
    if (modal.style.display !== "none") {
      return;
    }

    /*
     * 【修复 1】只拦截"真正需要打字的输入框"。
     *
     * 原来的写法拦截了所有 INPUT，
     * 导致点击 checkbox（自动保存、标注列表的可见性开关）之后，
     * 焦点留在 checkbox 上，A / D 等快捷键全部失效。
     */
    const t = event.target;

    const isTypingTarget =
      t.tagName === "TEXTAREA" ||
      (
        t.tagName === "INPUT" &&
        !["checkbox", "radio", "range", "button"].includes(t.type)
      );

    if (isTypingTarget) {
      return;
    }

    if (event.code === "Space") {
      spaceDown = true;
      event.preventDefault();
      return;
    }

    if (
      (event.ctrlKey || event.metaKey) &&
      event.key.toLowerCase() === "s"
    ) {
      event.preventDefault();
      save();
      return;
    }

    if (
      (event.ctrlKey || event.metaKey) &&
      event.key.toLowerCase() === "z"
    ) {
      event.preventDefault();
      undo();
      return;
    }

    switch (event.key) {
      case "d":
      case "D":
        openImage(curIdx + 1);
        break;

      case "a":
      case "A":
        openImage(curIdx - 1);
        break;

      case "e":
      case "E":
        setMode("edit");
        break;

      case "p":
      case "P":
        setMode("polygon");
        break;

      case "r":
      case "R":
        setMode("rectangle");
        break;

      case "c":
      case "C":
        setMode("circle");
        break;

      /*
       * 原来的 L 线段快捷键，
       * 现在改为 linestrip 折线。
       */
      case "l":
      case "L":
        setMode("linestrip");
        break;

      case "o":
      case "O":
        setMode("point");
        break;

      case "f":
      case "F":
        fitView();
        render();
        updateStatus();
        break;

      /*
       * Enter 完成多边形或折线。
       */
      case "Enter":
        if (
          mode === "polygon" ||
          mode === "linestrip"
        ) {
          event.preventDefault();
          finishMultiPoint();
          render();
        }
        break;

      case "Escape":
        drawing = [];
        drawStart = null;
        selectedIdx = -1;

        refreshShapeList();
        render();
        break;

      case "Delete":
        deleteSelected();
        break;

      /*
       * 绘制 polygon / linestrip 时，
       * Backspace 删除最后一个待创建节点。
       */
      case "Backspace":
        event.preventDefault();

        if (
          (
            mode === "polygon" ||
            mode === "linestrip"
          ) &&
          drawing.length
        ) {
          drawing.pop();
          render();
        } else {
          deleteSelected();
        }

        break;

      case "+":
      case "=":
        zoomAt(
          wrap.clientWidth / 2,
          wrap.clientHeight / 2,
          1.2
        );
        break;

      case "-":
        zoomAt(
          wrap.clientWidth / 2,
          wrap.clientHeight / 2,
          1 / 1.2
        );
        break;
    }
  });

  document.addEventListener("keyup", event => {
    if (event.code === "Space") {
      spaceDown = false;
    }
  });

  window.addEventListener("beforeunload", event => {
    if (dirty) {
      event.preventDefault();
      event.returnValue = "";
    }
  });

  // ============================================================
  // 模式切换
  // ============================================================

  function setMode(newMode) {
    mode = newMode;

    drawing = [];
    drawStart = null;

    document
      .querySelectorAll(".mode-btn")
      .forEach(button => {
        button.classList.toggle(
          "active",
          button.dataset.mode === newMode
        );
      });

    render();
    updateStatus();
  }

  document
    .querySelectorAll(".mode-btn")
    .forEach(button => {
      button.addEventListener("click", () => {
        setMode(button.dataset.mode);
      });
    });

  // ============================================================
  // 标签对话框
  // ============================================================

  let modalResolve = null;

  function showLabelDialog(defaultLabel, defaultGroup) {
    return new Promise(resolve => {
      modalResolve = resolve;

      labelInput.value = defaultLabel || "";

      groupInput.value = (
        defaultGroup == null
          ? ""
          : defaultGroup
      );

      const options = document.getElementById("labelOptions");
      const quickLabels = document.getElementById("quickLabels");

      options.innerHTML = "";
      quickLabels.innerHTML = "";

      Object.keys(labelColors).forEach(label => {
        const option = document.createElement("option");
        option.value = label;
        options.appendChild(option);

        const button = document.createElement("button");

        button.type = "button";
        button.textContent = label;
        button.style.borderColor = getColor(label);

        button.onclick = function () {
          labelInput.value = label;
          labelInput.focus();
        };

        quickLabels.appendChild(button);
      });

      modal.style.display = "flex";

      setTimeout(() => {
        labelInput.focus();
        labelInput.select();
      }, 0);
    });
  }

  function closeModal(result) {
    modal.style.display = "none";

    const resolve = modalResolve;
    modalResolve = null;

    if (resolve) {
      resolve(result);
    }
  }

  document.getElementById("modalOk").onclick = function () {
    const label = labelInput.value.trim();

    if (!label) {
      labelInput.focus();
      return;
    }

    const groupValue = groupInput.value.trim();

    closeModal({
      label,

      group: (
        groupValue === ""
          ? null
          : parseInt(groupValue, 10)
      )
    });
  };

  document.getElementById("modalCancel").onclick = function () {
    closeModal(null);
  };

  [labelInput, groupInput].forEach(element => {
    element.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("modalOk").click();
      }

      if (event.key === "Escape") {
        event.preventDefault();
        closeModal(null);
      }
    });
  });

  // ============================================================
  // 侧边栏
  // ============================================================

  function refreshShapeList() {
    const list = document.getElementById("shapeList");

    list.innerHTML = "";

    shapes.forEach((shape, index) => {
      const item = document.createElement("li");

      if (index === selectedIdx) {
        item.classList.add("active");
      }

      const checkbox = document.createElement("input");

      checkbox.type = "checkbox";
      checkbox.checked = !shape.hidden;

      checkbox.onclick = event => {
        event.stopPropagation();

        shape.hidden = !checkbox.checked;

        // 【修复 2】点击后移除焦点，避免吞掉快捷键、
        // 以及按空格时意外 toggle 该复选框
        checkbox.blur();

        render();
      };

      const dot = document.createElement("span");

      dot.className = "dot";
      dot.style.background = getColor(shape.label);

      const text = document.createElement("span");

      text.className = "txt";

      text.textContent = (
        shape.label +
        (
          shape.group_id != null
            ? ` (${shape.group_id})`
            : ""
        ) +
        ` · ${normalizeShapeType(shape.shape_type)}`
      );

      const deleteButton = document.createElement("button");

      deleteButton.className = "del";
      deleteButton.textContent = "×";
      deleteButton.title = "删除";

      deleteButton.onclick = event => {
        event.stopPropagation();

        selectedIdx = index;
        deleteSelected();
      };

      item.append(
        checkbox,
        dot,
        text,
        deleteButton
      );

      item.onclick = function () {
        selectedIdx = index;

        refreshShapeList();
        render();
      };

      item.ondblclick = function () {
        editLabel(index);
      };

      list.appendChild(item);
    });
  }

  function refreshLabelList() {
    const list = document.getElementById("labelList");

    list.innerHTML = "";

    const counts = {};

    shapes.forEach(shape => {
      counts[shape.label] = (
        counts[shape.label] || 0
      ) + 1;
    });

    Object.keys(labelColors).forEach(label => {
      const item = document.createElement("li");

      const dot = document.createElement("span");

      dot.className = "dot";
      dot.style.background = getColor(label);

      const text = document.createElement("span");

      text.className = "txt";
      text.textContent = label;

      const count = document.createElement("span");

      count.textContent = counts[label] || 0;
      count.style.color = "#888";

      item.append(
        dot,
        text,
        count
      );

      list.appendChild(item);
    });
  }

  function refreshFileList() {
    const list = document.getElementById("fileList");

    list.innerHTML = "";

    document.getElementById("fileCount").textContent = images.length
      ? `(${curIdx + 1}/${images.length})`
      : "";

    images.forEach((name, index) => {
      const item = document.createElement("li");

      if (index === curIdx) {
        item.classList.add("active");
      }

      const mark = document.createElement("span");

      mark.className = "annotated-mark";
      mark.textContent = annotated.has(name)
        ? "✓"
        : "　";

      const text = document.createElement("span");

      text.className = "txt";
      text.textContent = name;
      text.title = name;

      item.append(
        mark,
        text
      );

      item.onclick = function () {
        openImage(index);
      };

      list.appendChild(item);

      if (index === curIdx) {
        item.scrollIntoView({
          block: "nearest"
        });
      }
    });
  }

  // ============================================================
  // 状态栏与消息提示
  // ============================================================

  const MODE_NAMES = {
    edit: "编辑",
    polygon: "多边形",
    rectangle: "矩形",
    circle: "圆",
    linestrip: "折线",
    point: "点"
  };

  function updateStatus() {
    document.getElementById("stFile").textContent = (
      curIdx >= 0
        ? `${images[curIdx]}  (${imgW}×${imgH})`
        : "未加载"
    );

    document.getElementById("stZoom").textContent = (
      `缩放: ${Math.round(view.scale * 100)}%`
    );

    document.getElementById("stPos").textContent = mouseImg
      ? (
        `坐标: (` +
        `${Math.round(mouseImg[0])}, ` +
        `${Math.round(mouseImg[1])})`
      )
      : "";

    document.getElementById("stMode").textContent = (
      `模式: ${MODE_NAMES[mode] || mode}`
    );

    document.getElementById("stDirty").textContent = dirty
      ? "● 未保存"
      : "";
  }

  let toastTimer = null;

  function flash(message, isError) {
    const toast = document.getElementById("toast");

    toast.textContent = message;
    toast.className = isError
      ? "err"
      : "";

    toast.style.display = "block";

    clearTimeout(toastTimer);

    toastTimer = setTimeout(() => {
      toast.style.display = "none";
    }, 2000);
  }

  // ============================================================
  // 工具栏
  // ============================================================

  /*
   * 【修复 2】点击工具栏任意按钮或复选框后移除焦点。
   *
   * 否则焦点留在按钮上，之后按空格 / 回车会意外地
   * 再次触发该按钮（例如反复触发"删除"），
   * 焦点留在复选框上则会吞掉 A / D 等快捷键。
   */
  document.getElementById("toolbar").addEventListener("click", event => {
    if (
      event.target.tagName === "BUTTON" ||
      event.target.tagName === "INPUT"
    ) {
      event.target.blur();
    }
  });

  document.getElementById("btnPrev").onclick = function () {
    openImage(curIdx - 1);
  };

  document.getElementById("btnNext").onclick = function () {
    openImage(curIdx + 1);
  };

  document.getElementById("btnUndo").onclick = undo;
  document.getElementById("btnDel").onclick = deleteSelected;
  document.getElementById("btnSave").onclick = save;

  document.getElementById("btnZoomIn").onclick = function () {
    zoomAt(
      wrap.clientWidth / 2,
      wrap.clientHeight / 2,
      1.2
    );
  };

  document.getElementById("btnZoomOut").onclick = function () {
    zoomAt(
      wrap.clientWidth / 2,
      wrap.clientHeight / 2,
      1 / 1.2
    );
  };

  document.getElementById("btnFit").onclick = function () {
    fitView();
    render();
    updateStatus();
  };

  document.getElementById("btnOrig").onclick = function () {
    const center = c2i(
      wrap.clientWidth / 2,
      wrap.clientHeight / 2
    );

    view.scale = 1;

    view.ox = (
      wrap.clientWidth / 2 -
      center[0]
    );

    view.oy = (
      wrap.clientHeight / 2 -
      center[1]
    );

    render();
    updateStatus();
  };

  // ============================================================
  // 启动
  // ============================================================

  new ResizeObserver(() => {
    render();
  }).observe(wrap);

  setMode("edit");
  loadImageList();

})();
</script>
</body>
</html>
